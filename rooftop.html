<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dery's Villa VR - Rooftop Terrace</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading-screen" id="loader">
        <div class="loading-logo">🌇</div>
        <div class="loading-title">Rooftop Terrace</div>
        <div class="loading-subtitle">Dery's Luxury Villa</div>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
        <div class="loading-hint">Use WASD to move · Mouse to look around</div>
    </div>

    <div class="room-label">🌇 Rooftop Terrace</div>
    <div class="hud">WASD to move · Mouse to look</div>
    <div class="crosshair"></div>

    <div class="nav-panel">
        <a class="nav-btn" href="pool.html"><span class="icon">🏊</span> Pool Area</a>
        <a class="nav-btn" href="index.html"><span class="icon">🌴</span> Go Outside</a>
    </div>

    <a-scene renderer="antialias: true" >
        <a-assets timeout="10000">
            <img id="wood-deck" src="assets/textures/wood-deck.jpg">
            <img id="stone-path" src="assets/textures/stone-path.jpg">
            <img id="sky" src="assets/textures/sky.jpg">
            <a-asset-item id="sofa-model" src="assets/models/sofa.glb"></a-asset-item>
        </a-assets>

        <a-sky src="#sky" material="shader: flat"></a-sky>

        <!-- Warm sunset lighting (boosted so GLTF models are visible) -->
        <a-light type="ambient" color="#FFF5E1" intensity="0.4"></a-light>

        <a-light type="directional" color="#FFD700" intensity="0.9" position="-10 5 -10" castShadow="true"></a-light>

        <a-light type="directional" color="#B0C4DE" intensity="0.3" position="5 8 5"></a-light>

        <a-light type="hemisphere" color="#FF6347" groundColor="#402410" intensity="0.5"></a-light>

        <a-light type="point" color="#FFE4B5" intensity="0.4" distance="15" position="0 3 0"></a-light>

        <!-- Camera -->
        <a-entity position="0 1.6 4">
            <a-camera wasd-controls="acceleration: 15" look-controls></a-camera>
        </a-entity>

        <!-- Floor -->
        <a-plane src="#wood-deck" rotation="-90 0 0" width="12" height="10" repeat="5 4" position="0 0 0"></a-plane>

        <!-- Railings - Front -->
        <a-box color="#F5F5DC" width="12" height="0.05" depth="0.08" position="0 1 5"></a-box>
        <a-box color="#F5F5DC" width="12" height="0.05" depth="0.08" position="0 0.5 5"></a-box>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-6 0.5 5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-3 0.5 5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="0 0.5 5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="3 0.5 5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="6 0.5 5"></a-cylinder>
        <!-- Left -->
        <a-box color="#F5F5DC" width="0.08" height="0.05" depth="10" position="-6 1 0"></a-box>
        <a-box color="#F5F5DC" width="0.08" height="0.05" depth="10" position="-6 0.5 0"></a-box>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-6 0.5 -5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-6 0.5 -2.5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-6 0.5 0"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="-6 0.5 2.5"></a-cylinder>
        <!-- Right -->
        <a-box color="#F5F5DC" width="0.08" height="0.05" depth="10" position="6 1 0"></a-box>
        <a-box color="#F5F5DC" width="0.08" height="0.05" depth="10" position="6 0.5 0"></a-box>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="6 0.5 -5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="6 0.5 -2.5"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="6 0.5 0"></a-cylinder>
        <a-cylinder color="#F5F5DC" radius="0.04" height="1" position="6 0.5 2.5"></a-cylinder>
        <!-- Back -->
        <a-box color="#F5F5DC" width="12" height="0.05" depth="0.08" position="0 1 -5"></a-box>
        <a-box color="#F5F5DC" width="12" height="0.05" depth="0.08" position="0 0.5 -5"></a-box>

        <!-- ===== SOFA MODEL (replaces primitive L-shape sofa) ===== -->
        <a-entity gltf-model="#sofa-model" position="-3 0 -2" rotation="0 0 0" scale="1 1 1"></a-entity>

        <!-- Coffee table with candle -->
        <a-entity position="-2.5 0 -0.5">
            <a-box color="#5C3317" width="1" height="0.06" depth="0.7" position="0 0.4 0"></a-box>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.4" position="-0.4 0.2 -0.25"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.4" position="0.4 0.2 -0.25"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.4" position="-0.4 0.2 0.25"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.4" position="0.4 0.2 0.25"></a-cylinder>
            <a-cylinder color="#FFF8DC" radius="0.04" height="0.12" position="0 0.49 0"></a-cylinder>
            <a-sphere color="#FF6347" radius="0.02" position="0 0.56 0"
                      animation="property: material.opacity; from: 0.5; to: 1; dur: 500; loop: true; dir: alternate"
                      animation__scale="property: scale; from: 1 1 1; to: 1.2 1.3 1.2; dur: 800; loop: true; dir: alternate"></a-sphere>
            <a-light type="point" color="#FF6347" intensity="0.2" distance="2" position="0 0.6 0"></a-light>
        </a-entity>

        <!-- Round dining table -->
        <a-entity position="3 0 -1">
            <a-cylinder color="#5C3317" radius="0.7" height="0.06" position="0 0.75 0"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.08" height="0.75" position="0 0.37 0"></a-cylinder>
            <a-cylinder color="#FFF" radius="0.03" height="0.15" position="-0.2 0.85 0" opacity="0.6"></a-cylinder>
            <a-cylinder color="#FFF" radius="0.03" height="0.15" position="0.2 0.85 0" opacity="0.6"></a-cylinder>
            <a-cylinder color="#8B4513" radius="0.05" height="0.15" position="0 0.85 0"></a-cylinder>
            <a-sphere color="#FF69B4" radius="0.05" position="0 0.98 0"></a-sphere>
        </a-entity>
        <!-- Chairs -->
        <a-entity position="3 0 -2">
            <a-box color="#5C3317" width="0.5" height="0.05" depth="0.5" position="0 0.45 0"></a-box>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="-0.2 0.22 -0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="0.2 0.22 -0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="-0.2 0.22 0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="0.2 0.22 0.2"></a-cylinder>
            <a-box color="#5C3317" width="0.5" height="0.5" depth="0.05" position="0 0.72 -0.25"></a-box>
        </a-entity>
        <a-entity position="3 0 0">
            <a-box color="#5C3317" width="0.5" height="0.05" depth="0.5" position="0 0.45 0"></a-box>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="-0.2 0.22 -0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="0.2 0.22 -0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="-0.2 0.22 0.2"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.03" height="0.45" position="0.2 0.22 0.2"></a-cylinder>
            <a-box color="#5C3317" width="0.5" height="0.5" depth="0.05" position="0 0.72 0.25"></a-box>
        </a-entity>

        <!-- String lights -->
        <a-entity position="0 2.8 0">
            <a-sphere color="#FFFACD" radius="0.06" position="-4 0 -3" animation="property: material.opacity; from: 0.5; to: 1; dur: 1800; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="-2 0 -3" animation="property: material.opacity; from: 0.6; to: 1; dur: 2000; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="0 0 -3" animation="property: material.opacity; from: 0.7; to: 1; dur: 1600; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="2 0 -3" animation="property: material.opacity; from: 0.5; to: 1; dur: 2200; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="4 0 -3" animation="property: material.opacity; from: 0.6; to: 1; dur: 1900; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="-4 0 0" animation="property: material.opacity; from: 0.6; to: 1; dur: 2100; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="-2 0 0" animation="property: material.opacity; from: 0.5; to: 1; dur: 1700; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="0 0 0" animation="property: material.opacity; from: 0.7; to: 1; dur: 2300; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="2 0 0" animation="property: material.opacity; from: 0.6; to: 1; dur: 1500; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="4 0 0" animation="property: material.opacity; from: 0.5; to: 1; dur: 2000; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="-4 0 3" animation="property: material.opacity; from: 0.7; to: 1; dur: 1900; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="-2 0 3" animation="property: material.opacity; from: 0.5; to: 1; dur: 2100; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="0 0 3" animation="property: material.opacity; from: 0.6; to: 1; dur: 1800; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFD700" radius="0.06" position="2 0 3" animation="property: material.opacity; from: 0.7; to: 1; dur: 2200; loop: true; dir: alternate"></a-sphere>
            <a-sphere color="#FFFACD" radius="0.06" position="4 0 3" animation="property: material.opacity; from: 0.5; to: 1; dur: 1600; loop: true; dir: alternate"></a-sphere>
            <!-- Poles -->
            <a-cylinder color="#333" radius="0.02" height="3" position="-5 -1.2 -4"></a-cylinder>
            <a-cylinder color="#333" radius="0.02" height="3" position="5 -1.2 -4"></a-cylinder>
            <a-cylinder color="#333" radius="0.02" height="3" position="-5 -1.2 4"></a-cylinder>
            <a-cylinder color="#333" radius="0.02" height="3" position="5 -1.2 4"></a-cylinder>
        </a-entity>

        <!-- Potted plants -->
        <a-entity position="-5 0 -4">
            <a-cylinder color="#8B4513" radius="0.25" height="0.5" position="0 0.25 0"></a-cylinder>
            <a-sphere color="#228B22" radius="0.4" position="0 0.7 0"></a-sphere>
            <a-sphere color="#2E7D32" radius="0.3" position="0.1 0.9 0.1"></a-sphere>
        </a-entity>
        <a-entity position="5 0 -4">
            <a-cylinder color="#8B4513" radius="0.25" height="0.5" position="0 0.25 0"></a-cylinder>
            <a-sphere color="#228B22" radius="0.4" position="0 0.7 0"></a-sphere>
        </a-entity>
        <a-entity position="-5 0 3">
            <a-cylinder color="#8B4513" radius="0.2" height="0.4" position="0 0.2 0"></a-cylinder>
            <a-sphere color="#FF69B4" radius="0.25" position="0 0.5 0"></a-sphere>
        </a-entity>
        <a-entity position="5 0 3">
            <a-cylinder color="#8B4513" radius="0.2" height="0.4" position="0 0.2 0"></a-cylinder>
            <a-sphere color="#FFD93D" radius="0.25" position="0 0.5 0"></a-sphere>
        </a-entity>

    </a-scene>

    <script>
        var scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', function () {
            setTimeout(function () { document.getElementById('loader').classList.add('hidden'); }, 2800);
        });
        setTimeout(function () { document.getElementById('loader').classList.add('hidden'); }, 5000);
    </script>
</body>
</html>
