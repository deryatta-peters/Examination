<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dery's Villa VR - Living Room</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading-screen" id="loader">
        <div class="loading-logo">🛋️</div>
        <div class="loading-title">Living Room</div>
        <div class="loading-subtitle">Dery's Luxury Villa</div>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
        <div class="loading-hint">Use WASD to move · Mouse to look around</div>
    </div>

    <div class="room-label">🛋️ Living Room</div>
    <div class="hud">WASD to move · Mouse to look · Use side buttons to navigate</div>
    <div class="crosshair"></div>

    <div class="nav-panel">
        <a class="nav-btn" href="bedroom.html"><span class="icon">🛏️</span> Bedroom</a>
        <a class="nav-btn" href="kitchen.html"><span class="icon">🍳</span> Kitchen</a>
        <a class="nav-btn" href="index.html"><span class="icon">🌴</span> Go Outside</a>
    </div>

    <a-scene renderer="antialias: true">
        <a-assets timeout="10000">
            <img id="wood-floor" src="assets/textures/wood-floor.jpg">
            <img id="wall" src="assets/textures/wall.jpg">
            <img id="fabric" src="assets/textures/fabric.jpg">
            <img id="door" src="assets/textures/door.jpg">
            <a-asset-item id="sofa-model" src="assets/models/sofa.glb"></a-asset-item>
            <a-asset-item id="dog-model" src="assets/models/dog.glb"></a-asset-item>
        </a-assets>

        <!-- Lighting -->
        <a-light type="ambient" color="#FFF5E1" intensity="0.6"></a-light>
        <a-light type="point" color="#FFE4B5" intensity="1.2" distance="18" position="0 3.5 0"></a-light>
        <a-light type="point" color="#FFA500" intensity="0.5" distance="8" position="-4 2 -3"></a-light>
        <a-light type="point" color="#FFA500" intensity="0.5" distance="8" position="4 2 2"></a-light>
        <a-light type="directional" color="#FFF5E1" intensity="0.4" position="2 4 1"></a-light>

        <!-- Camera -->
        <a-entity position="0 1.6 3">
            <a-camera wasd-controls="acceleration: 15" look-controls></a-camera>
        </a-entity>

        <!-- ===== ROOM SHELL ===== -->
        <!-- Floor -->
        <a-plane src="#wood-floor" rotation="-90 0 0" width="12" height="12" repeat="5 5" position="0 0 0"></a-plane>
        <!-- Ceiling -->
        <a-plane color="#FFF8F0" rotation="90 0 0" width="12" height="12" position="0 4 0"></a-plane>
        <!-- Back wall -->
        <a-box src="#wall" width="12" height="4" depth="0.2" position="0 2 -6" repeat="3 2"></a-box>
        <!-- Front wall -->
        <a-box src="#wall" width="12" height="4" depth="0.2" position="0 2 6" repeat="3 2"></a-box>
        <!-- Left wall -->
        <a-box src="#wall" width="0.2" height="4" depth="12" position="-6 2 0" repeat="1 3"></a-box>
        <!-- Right wall -->
        <a-box src="#wall" width="0.2" height="4" depth="12" position="6 2 0" repeat="1 3"></a-box>

        <!-- ===== CEILING LIGHT FIXTURE ===== -->
        <a-cylinder color="#DAA520" radius="0.4" height="0.08" position="0 3.95 0"></a-cylinder>
        <a-cylinder color="#333" radius="0.02" height="0.3" position="0 3.8 0"></a-cylinder>
        <a-sphere color="#FFFACD" radius="0.25" position="0 3.5 0" opacity="0.9"
                  animation="property: material.opacity; from: 0.7; to: 1; dur: 3000; loop: true; dir: alternate"></a-sphere>

        <!-- ===== 3 SOFAS (using sofa.glb) arranged in U-shape facing TV ===== -->
        <!-- Main sofa (rotated 180° to face the TV on back wall) -->
        <a-entity gltf-model="#sofa-model" position="0 0 -1" rotation="0 180 0" scale="1 1 1"></a-entity>
        <!-- Left sofa (angled inward) -->
        <a-entity gltf-model="#sofa-model" position="-3.5 0 -3.5" rotation="0 90 0" scale="1 1 1"></a-entity>
        <!-- Right sofa (angled inward) -->
        <a-entity gltf-model="#sofa-model" position="3.5 0 -3.5" rotation="0 -90 0" scale="1 1 1"></a-entity>

        <!-- ===== COFFEE TABLE (center of sofa arrangement) ===== -->
        <a-entity position="0 0 -3.5">
            <a-box color="#5C3317" width="1.6" height="0.08" depth="0.9" position="0 0.45 0"></a-box>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.45" position="-0.65 0.22 -0.35"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.45" position="0.65 0.22 -0.35"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.45" position="-0.65 0.22 0.35"></a-cylinder>
            <a-cylinder color="#4a2f1a" radius="0.04" height="0.45" position="0.65 0.22 0.35"></a-cylinder>
            <!-- Items on table -->
            <a-box color="#2F4F4F" width="0.4" height="0.03" depth="0.3" position="-0.3 0.51 0"></a-box>
            <a-cylinder color="#DAA520" radius="0.12" height="0.2" position="0.4 0.59 0"></a-cylinder>
            <a-sphere color="#FF6B6B" radius="0.06" position="0.4 0.75 0"></a-sphere>
            <!-- Remote control -->
            <a-box color="#222" width="0.15" height="0.02" depth="0.06" position="0 0.5 0.2"></a-box>
        </a-entity>

        <!-- ===== TV AREA (against back wall) ===== -->
        <!-- TV stand / entertainment unit -->
        <a-box color="#4a2f1a" width="3" height="0.7" depth="0.5" position="0 0.35 -5.6"></a-box>
        <!-- Drawers detail -->
        <a-box color="#3d1c00" width="0.9" height="0.25" depth="0.02" position="-0.95 0.35 -5.33"></a-box>
        <a-box color="#3d1c00" width="0.9" height="0.25" depth="0.02" position="0 0.35 -5.33"></a-box>
        <a-box color="#3d1c00" width="0.9" height="0.25" depth="0.02" position="0.95 0.35 -5.33"></a-box>
        <!-- Drawer handles -->
        <a-cylinder color="#DAA520" radius="0.015" height="0.12" rotation="0 0 90" position="-0.95 0.35 -5.31"></a-cylinder>
        <a-cylinder color="#DAA520" radius="0.015" height="0.12" rotation="0 0 90" position="0 0.35 -5.31"></a-cylinder>
        <a-cylinder color="#DAA520" radius="0.015" height="0.12" rotation="0 0 90" position="0.95 0.35 -5.31"></a-cylinder>

        <!-- TV screen -->
        <a-box color="#111" width="2.4" height="1.4" depth="0.08" position="0 1.6 -5.7"></a-box>
        <!-- TV bezel (thin border) -->
        <a-box color="#000" width="2.5" height="1.5" depth="0.06" position="0 1.6 -5.72"></a-box>
        <!-- TV screen glow (animated) -->
        <a-box color="#1a1a3e" width="2.3" height="1.3" depth="0.03" position="0 1.6 -5.66"
               animation="property: material.color; from: #1a1a3e; to: #16213e; dur: 5000; loop: true; dir: alternate"></a-box>
        <!-- TV stand/neck -->
        <a-box color="#222" width="0.3" height="0.15" depth="0.2" position="0 0.78 -5.6"></a-box>
        <!-- TV base -->
        <a-box color="#222" width="0.8" height="0.03" depth="0.25" position="0 0.72 -5.55"></a-box>

        <!-- Sound bar under TV -->
        <a-box color="#222" width="1.2" height="0.08" depth="0.12" position="0 0.75 -5.5"></a-box>
        <a-cylinder color="#333" radius="0.02" height="0.01" position="-0.4 0.75 -5.43"></a-cylinder>
        <a-cylinder color="#333" radius="0.02" height="0.01" position="0 0.75 -5.43"></a-cylinder>
        <a-cylinder color="#333" radius="0.02" height="0.01" position="0.4 0.75 -5.43"></a-cylinder>

        <!-- Decorations on TV stand -->
        <!-- Left: small plant -->
        <a-entity position="-1.2 0.7 -5.5">
            <a-cylinder color="#8B4513" radius="0.06" height="0.12" position="0 0.06 0"></a-cylinder>
            <a-sphere color="#228B22" radius="0.1" position="0 0.18 0"></a-sphere>
        </a-entity>
        <!-- Right: books stack -->
        <a-box color="#8B0000" width="0.15" height="0.08" depth="0.2" position="1.2 0.74 -5.5"></a-box>
        <a-box color="#006400" width="0.15" height="0.06" depth="0.2" position="1.2 0.81 -5.5"></a-box>
        <a-box color="#00008B" width="0.15" height="0.07" depth="0.2" position="1.2 0.87 -5.5"></a-box>

        <!-- ===== BOOKSHELF (left wall) ===== -->
        <a-entity position="-5.6 0 -2">
            <!-- Shelf frame -->
            <a-box color="#5C3317" width="0.4" height="2.8" depth="1.8" position="0 1.4 0"></a-box>
            <!-- Shelf dividers -->
            <a-box color="#4a2f1a" width="0.38" height="0.04" depth="1.78" position="0 0.9 0"></a-box>
            <a-box color="#4a2f1a" width="0.38" height="0.04" depth="1.78" position="0 1.6 0"></a-box>
            <a-box color="#4a2f1a" width="0.38" height="0.04" depth="1.78" position="0 2.3 0"></a-box>
            <!-- Books top shelf -->
            <a-box color="#8B0000" width="0.12" height="0.35" depth="0.22" position="0.08 2.55 -0.5"></a-box>
            <a-box color="#006400" width="0.12" height="0.3" depth="0.22" position="0.08 2.55 -0.2"></a-box>
            <a-box color="#00008B" width="0.12" height="0.32" depth="0.22" position="0.08 2.55 0.1"></a-box>
            <a-box color="#DAA520" width="0.12" height="0.28" depth="0.22" position="0.08 2.55 0.4"></a-box>
            <a-box color="#4B0082" width="0.12" height="0.3" depth="0.22" position="0.08 2.55 0.65"></a-box>
            <!-- Books middle shelf -->
            <a-box color="#8B4513" width="0.12" height="0.3" depth="0.22" position="0.08 1.85 -0.4"></a-box>
            <a-box color="#2F4F4F" width="0.12" height="0.34" depth="0.22" position="0.08 1.85 -0.1"></a-box>
            <a-box color="#800020" width="0.12" height="0.28" depth="0.22" position="0.08 1.85 0.2"></a-box>
            <!-- Small decorative item on middle shelf -->
            <a-sphere color="#DAA520" radius="0.06" position="0.08 1.7 0.6"></a-sphere>
            <!-- Books lower shelf -->
            <a-box color="#191970" width="0.12" height="0.32" depth="0.22" position="0.08 1.15 -0.3"></a-box>
            <a-box color="#556B2F" width="0.12" height="0.28" depth="0.22" position="0.08 1.15 0"></a-box>
            <a-box color="#8B0000" width="0.12" height="0.3" depth="0.22" position="0.08 1.15 0.3"></a-box>
        </a-entity>

        <!-- ===== FLOOR LAMPS ===== -->
        <!-- Left lamp -->
        <a-entity position="-4.5 0 -5">
            <a-cylinder color="#333" radius="0.2" height="0.05" position="0 0.02 0"></a-cylinder>
            <a-cylinder color="#333" radius="0.04" height="1.6" position="0 0.82 0"></a-cylinder>
            <a-cone color="#DAA520" radiusBottom="0.35" radiusTop="0.15" height="0.4" position="0 1.8 0" open-ended="true"></a-cone>
            <a-light type="point" color="#FFE4B5" intensity="0.5" distance="5" position="0 1.6 0"></a-light>
        </a-entity>
        <!-- Right lamp -->
        <a-entity position="4.5 0 -5">
            <a-cylinder color="#333" radius="0.2" height="0.05" position="0 0.02 0"></a-cylinder>
            <a-cylinder color="#333" radius="0.04" height="1.6" position="0 0.82 0"></a-cylinder>
            <a-cone color="#DAA520" radiusBottom="0.35" radiusTop="0.15" height="0.4" position="0 1.8 0" open-ended="true"></a-cone>
            <a-light type="point" color="#FFE4B5" intensity="0.5" distance="5" position="0 1.6 0"></a-light>
        </a-entity>

        <!-- ===== AREA RUG (under coffee table) ===== -->
        <a-plane color="#8B4513" rotation="-90 0 0" width="5" height="4" position="0 0.02 -3" opacity="0.8"></a-plane>
        <a-plane color="#CD853F" rotation="-90 0 0" width="4.5" height="3.5" position="0 0.025 -3" opacity="0.7"></a-plane>

        <!-- ===== WALL DECORATIONS ===== -->
        <!-- Large painting (back wall, above TV) -->
        <a-box color="#DAA520" width="2" height="0.8" depth="0.05" position="0 3.2 -5.88"></a-box>
        <a-box color="#4a6741" width="1.8" height="0.6" depth="0.04" position="0 3.2 -5.85"></a-box>

        <!-- Side paintings (left wall) -->
        <a-box color="#DAA520" width="0.04" height="0.8" depth="1" position="-5.88 2.5 1"></a-box>
        <a-box color="#3a5a7c" width="0.03" height="0.6" depth="0.8" position="-5.86 2.5 1"></a-box>

        <!-- Wall clock (right wall) -->
        <a-circle color="#FFF8DC" radius="0.35" position="5.88 2.8 -2" rotation="0 -90 0"></a-circle>
        <a-circle color="#333" radius="0.32" position="5.87 2.8 -2" rotation="0 -90 0"></a-circle>
        <a-circle color="#FFF8DC" radius="0.3" position="5.86 2.8 -2" rotation="0 -90 0"></a-circle>

        <!-- ===== POTTED PLANTS ===== -->
        <!-- Large plant (corner) -->
        <a-entity position="-5 0 4.5">
            <a-cylinder color="#8B4513" radius="0.25" height="0.5" position="0 0.25 0"></a-cylinder>
            <a-sphere color="#228B22" radius="0.45" position="0 0.8 0"></a-sphere>
            <a-sphere color="#2E7D32" radius="0.35" position="0.1 1.05 0.1"></a-sphere>
            <a-sphere color="#1B5E20" radius="0.25" position="-0.1 1.15 -0.05"></a-sphere>
        </a-entity>
        <!-- Small plant (right side) -->
        <a-entity position="5 0 -5">
            <a-cylinder color="#8B4513" radius="0.15" height="0.35" position="0 0.17 0"></a-cylinder>
            <a-sphere color="#228B22" radius="0.25" position="0 0.5 0"></a-sphere>
        </a-entity>

        <!-- ===== DOG (stationary, behind center sofa) ===== -->
        <a-entity gltf-model="#dog-model" position="-2 0 -4" rotation="0 180 0" scale="1 1 1"></a-entity>

        <!-- ===== DOOR INDICATORS ===== -->
        <!-- Bedroom door (left wall) -->
        <a-entity position="-5.85 0 -3.5">
            <a-box color="#5C3317" width="0.15" height="2.8" depth="1.3" position="0 1.4 0"></a-box>
            <a-box src="#door" width="0.1" height="2.5" depth="1" position="0.03 1.25 0">
                <a-sphere color="#DAA520" radius="0.06" position="0.06 0 0.3"></a-sphere>
            </a-box>
            <a-text value="Bedroom" color="#FFD700" align="center" width="2.5" position="0.1 2.9 0" rotation="0 90 0"></a-text>
        </a-entity>

        <!-- Kitchen door (right wall) -->
        <a-entity position="5.85 0 -3.5">
            <a-box color="#5C3317" width="0.15" height="2.8" depth="1.3" position="0 1.4 0"></a-box>
            <a-box src="#door" width="0.1" height="2.5" depth="1" position="-0.03 1.25 0">
                <a-sphere color="#DAA520" radius="0.06" position="-0.06 0 -0.3"></a-sphere>
            </a-box>
            <a-text value="Kitchen" color="#FFD700" align="center" width="2.5" position="-0.1 2.9 0" rotation="0 -90 0"></a-text>
        </a-entity>

        <!-- Exit door (front wall) -->
        <a-entity position="0 0 5.85">
            <a-box color="#5C3317" width="1.3" height="2.8" depth="0.15" position="0 1.4 0"></a-box>
            <a-box src="#door" width="1" height="2.5" depth="0.1" position="0 1.25 0.03">
                <a-sphere color="#DAA520" radius="0.06" position="0.3 0 0.06"></a-sphere>
            </a-box>
            <a-text value="Exit" color="#FFD700" align="center" width="2.5" position="0 2.9 0.1"></a-text>
        </a-entity>

        <!-- ===== WINDOWS ===== -->
        <!-- Left wall window -->
        <a-box color="#5C3317" width="0.12" height="1.6" depth="2.1" position="-5.92 2.3 2"></a-box>
        <a-box color="#87CEEB" width="0.08" height="1.4" depth="1.9" position="-5.9 2.3 2" opacity="0.4"></a-box>
        <a-box color="#5C3317" width="0.1" height="0.06" depth="1.9" position="-5.9 2.3 2"></a-box>
        <a-box color="#5C3317" width="0.1" height="1.4" depth="0.06" position="-5.9 2.3 2"></a-box>

        <!-- Right wall window -->
        <a-box color="#5C3317" width="0.12" height="1.6" depth="2.1" position="5.92 2.3 2"></a-box>
        <a-box color="#87CEEB" width="0.08" height="1.4" depth="1.9" position="5.9 2.3 2" opacity="0.4"></a-box>

    </a-scene>

    <script>
        var scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', function () {
            setTimeout(function () { document.getElementById('loader').classList.add('hidden'); }, 2800);
        });
        setTimeout(function () { document.getElementById('loader').classList.add('hidden'); }, 5000);
    </script>
</body>
</html>
